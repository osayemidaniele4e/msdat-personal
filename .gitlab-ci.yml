image: node:16

stages:
  - build
  - deploy

cache:
  key: ${CI_COMMIT_REF_SLUG}
  paths:
    - node_modules/

# --------------------
# BUILD STAGE (GitLab)
# --------------------
build_frontend:
  stage: build
  script:
    - yarn install --frozen-lockfile
    - yarn build
    - node scripts/generateImports.js
  artifacts:
    paths:
      - dist/
    expire_in: 1 hour
  only:
    - develop

# --------------------
# DEPLOY STAGE (Server)
# --------------------
deploy_app:
  stage: deploy
  image: alpine:latest
  before_script:
    - apk add --no-cache openssh rsync
    - mkdir -p ~/.ssh
    - echo "$MSDATDEVELOP" > ~/.ssh/id_rsa
    - chmod 600 ~/.ssh/id_rsa
    - echo -e "Host *\n\tStrictHostKeyChecking no\n" > ~/.ssh/config
  script:
  - ssh e4esysadmin@208.87.128.190 "mkdir -p /srv/msdat3.0/msdat/dist" \
    && rsync -avz --delete dist/ e4esysadmin@208.87.128.190:/srv/msdat3.0/msdat/dist/ \
    && ssh e4esysadmin@208.87.128.190 "cd /srv/msdat3.0/msdat && sudo pm2 restart 0"
      "
  only:
    - develop
    



deploy_advanced analytics:
  stage: deploy
  
  before_script: 
      - mkdir -p ~/.ssh
      - echo -e "$MSDATDEVELOP" > ~/.ssh/id_rsa
      - chmod 600 ~/.ssh/id_rsa
      - '[[ -f /.dockerenv ]] && echo -e "Host *\n\tStrictHostKeyChecking no\n\n" > ~/.ssh/config'
  script:
    - ssh -p3322 e4esysadmin@208.87.128.190 "cd /srv/msdat/ && git checkout . && git checkout advanced && git pull && sudo yarn install && sudo yarn run build && sudo systemctl restart nginx "
  only:
    - advanced





deploy_staging:
  stage: deploy
  
  before_script: 
      - mkdir -p ~/.ssh
      - echo -e "$MSDATDEVELOP" > ~/.ssh/id_rsa
      - chmod 600 ~/.ssh/id_rsa
      - '[[ -f /.dockerenv ]] && echo -e "Host *\n\tStrictHostKeyChecking no\n\n" > ~/.ssh/config'
  script:
    - ssh -p3322 e4esysadmin@208.87.128.190 "cd ~/msdat/ && sudo chown e4esysadmin:e4esysadmin -R docs/ && git checkout . && git checkout staging && git pull && sudo yarn install  && sudo yarn build  && sudo yarn docs:build && sudo systemctl reload nginx "
  only:
    - staging


deploy_beta:
  stage: deploy
  
  before_script: 
      - mkdir -p ~/.ssh
      - echo -e "$MSDATMASTER" > ~/.ssh/id_rsa
      - chmod 600 ~/.ssh/id_rsa
      - '[[ -f /.dockerenv ]] && echo -e "Host *\n\tStrictHostKeyChecking no\n\n" > ~/.ssh/config'
  script:
      - ssh -p3322 e4esysadmin@172.93.48.4 "cd /srv/msdat/  && git pull origin master && sudo yarn install &&  sudo yarn build && sudo cp -r /var/www/msdat-dashboard/dist/covid* /srv/msdat/dist/ && sudo systemctl reload nginx "
  only:
    - master
  when: manual
