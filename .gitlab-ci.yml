deploy_develop:
  stage: deploy
  
  before_script: 
      - mkdir -p ~/.ssh
      - echo -e "$MSDATDEVELOP" > ~/.ssh/id_rsa
      - chmod 600 ~/.ssh/id_rsa
      - '[[ -f /.dockerenv ]] && echo -e "Host *\n\tStrictHostKeyChecking no\n\n" > ~/.ssh/config'
  script:
    - ssh -p3322 e4esysadmin@208.87.128.190 "cd ~/msdat/ && git checkout . && git checkout develop && git pull && sudo yarn install && sudo yarn run build && sudo systemctl restart nginx "
  only:
    - develop
  # when: manual

deploy_master:
  stage: deploy
  
  before_script: 
      - mkdir -p ~/.ssh
      - echo -e "$MSDATMASTER" > ~/.ssh/id_rsa
      - chmod 600 ~/.ssh/id_rsa
      - '[[ -f /.dockerenv ]] && echo -e "Host *\n\tStrictHostKeyChecking no\n\n" > ~/.ssh/config'
  script:
    - ssh -p3322 e4esysadmin@172.93.48.4 "cd /srv/msdat/ && git checkout . && git checkout master && git pull &&  nvm use 14 && yarn install &&  yarn  build && sudo systemctl restart nginx "
  only:
    - master
  when: manual
