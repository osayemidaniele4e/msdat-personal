image: node:10

variables:
  HOST: $DASHBOARD_HOST
  USERNAME: $DASHBOARD_USERNAME
  PASSWORD: $DASHBOARD_PASSWORD

stages:
  - ver
  - test
  - deploy

cache:
  paths:
    - node_modules/

ver:
  stage: ver
  script:
    - node --version
    - whoami

include:
  - template: Code-Quality.gitlab-ci.yml

code_quality:
  stage: test
  variables:
    REPORT_FORMAT: html
  artifacts:
    paths: [gl-code-quality-report.html]
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      when: always
      allow_failure: true
    - when: always


deploy_develop:
  stage: deploy
  
  before_script: 
      - mkdir -p ~/.ssh
      - echo -e "$MSDATDEVELOP" > ~/.ssh/id_rsa
      - chmod 600 ~/.ssh/id_rsa
      - '[[ -f /.dockerenv ]] && echo -e "Host *\n\tStrictHostKeyChecking no\n\n" > ~/.ssh/config'
  script:
    - ssh -p3322 e4esysadmin@208.87.128.190 "cd ~/msdat/ && git checkout . && git checkout develop && git pull && yarn install && yarn run build && sudo systemctl restart nginx "
  only:
    - develop
  when: manual
