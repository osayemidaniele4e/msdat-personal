image: "docker:20.10.16"

variables:
  DOCKER_TLS_CERTDIR: "/certs"

services:
  - docker:20.10.16-dind
  

stages:

  - deploy



deploy_develop:
  stage: deploy
  
  before_script: 
      - mkdir -p ~/.ssh
      - echo -e "$MSDATDEVELOP" > ~/.ssh/id_rsa
      - chmod 600 ~/.ssh/id_rsa
      - '[[ -f /.dockerenv ]] && echo -e "Host *\n\tStrictHostKeyChecking no\n\n" > ~/.ssh/config'
  script:
    - ssh -p3322 e4esysadmin@208.87.128.190 "cd /home/e4esysadmin/msdat-clone/ && git pull origin develop && sudo yarn install && sudo rm -rf dist && sudo yarn build && sudo systemctl reload nginx "
  only:
    - develop

