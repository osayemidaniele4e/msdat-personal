image: node:16

stages:
  - build
  - deploy

build_staging:
  stage: build
  only:
    - develop
  script:
    - test -f "$staging_env"
    - cp "$staging_env" .env
    - yarn install --frozen-lockfile
    - yarn build
    - yarn docs:build || true
  artifacts:
    paths:
      - dist/
      - docs/.vuepress/dist/
    expire_in: 1h

deploy_staging:
  stage: deploy
  only:
    - develop
  dependencies:
    - build_staging
  before_script:
    - mkdir -p ~/.ssh
    - echo "$MSDATDEVELOP" > ~/.ssh/id_rsa
    - chmod 600 ~/.ssh/id_rsa
    - '[[ -f /.dockerenv ]] && echo -e "Host *\n\tStrictHostKeyChecking no\n" > ~/.ssh/config'
  script:
    - rsync -avz --delete -e "ssh -p 3322" dist/ e4esysadmin@208.87.128.190:/srv/msdat/dist/
    - rsync -avz --delete -e "ssh -p 3322" docs/.vuepress/dist/ e4esysadmin@208.87.128.190:/srv/msdat/docs/ || true
    - ssh -p3322 e4esysadmin@208.87.128.190 "pm2 reload 0"
