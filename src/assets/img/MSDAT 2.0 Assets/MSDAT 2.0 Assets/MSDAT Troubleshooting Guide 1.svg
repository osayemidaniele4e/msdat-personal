      <text id="section2HeaderText" transform="translate(494.249 235)" fill="#232323" font-size="26" font-family="WorkSans-Regular, Work Sans"><tspan x="0" y="24">This is quite unusual, but for some reason the MSDAT Dashboard is not </tspan><tspan x="0" y="66">loading. We are really sorry about this.</tspan></text>
      <text id="section2HeaderText-2" data-name="section2HeaderText" transform="translate(494.249 374)" fill="#232323" font-size="22" font-family="WorkSans-Bold, Work Sans" font-weight="700"><tspan x="0" y="0">Clearing MSDAT cache from your browser might fix the problem:</tspan></text>
      <text id="section2HeaderText-3" data-name="section2HeaderText" transform="translate(494.249 774)" fill="#232323" font-size="22" font-family="WorkSans-SemiBold, Work Sans" font-weight="600"><tspan x="0" y="0">Get more help:</tspan></text>
      <g id="Group_2134" data-name="Group 2134" transform="translate(0 52)">
        <text id="Right-click_anywhere_on_the_page_and_select_Inspect." data-name="Right-click anywhere on the page and select Inspect." transform="translate(536 350)" fill="#232323" font-size="20" font-family="WorkSans-Regular, Work Sans"><tspan x="0" y="19">Right-click anywhere on the page and select </tspan><tspan y="19" font-family="WorkSans-Bold, Work Sans" font-weight="700">Inspect</tspan><tspan y="19">.</tspan></text>
        <text id="_1." data-name="1." transform="translate(508 371)" fill="#232323" font-size="20" font-family="WorkSans-Regular, Work Sans"><tspan x="0" y="0">1.</tspan></text>
      </g>
