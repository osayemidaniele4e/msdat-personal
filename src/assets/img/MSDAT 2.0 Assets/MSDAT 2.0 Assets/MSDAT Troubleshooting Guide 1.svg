        <text id="Click_on_Application_you_can_find_it_by_clicking_on_the_expand_arrow_after_Performance_." data-name="Click on Application (you can find it by clicking on the expand arrow after &quot;Performance&quot;)." transform="translate(536 350)" fill="#232323" font-size="20" font-family="WorkSans-Regular, Work Sans"><tspan x="0" y="19">Click on </tspan><tspan y="19" font-family="WorkSans-Bold, Work Sans" font-weight="700">Application</tspan><tspan y="19" xml:space="preserve"> (you can find it by clicking on the expand arrow after </tspan></text>
        <text id="_2." data-name="2." transform="translate(508 371)" fill="#232323" font-size="20" font-family="WorkSans-Regular, Work Sans"><tspan x="0" y="0">2.</tspan></text>
      </g>
      <g id="Group_2140" data-name="Group 2140" transform="translate(0 146)">
        <text id="Click_on_the_Clear_site_data_button_under_Clear_Storage._This_clears_existing_MSDAT_data_from_your_browser." data-name="Click on the Clear site data button under Clear Storage. This clears existing MSDAT data from your browser." transform="translate(536 350)" fill="#232323" font-size="20" font-family="WorkSans-Regular, Work Sans"><tspan x="0" y="19">Click on the </tspan><tspan y="19" font-family="WorkSans-Bold, Work Sans" font-weight="700">Clear site data</tspan><tspan y="19" xml:space="preserve"> button under Clear Storage. This clears existing MSDAT data </tspan><tspan x="0" y="43">from your browser.</tspan></text>
        <text id="_3." data-name="3." transform="translate(508 371)" fill="#232323" font-size="20" font-family="WorkSans-Regular, Work Sans"><tspan x="0" y="0">3.</tspan></text>
      </g>
      <g id="Group_2141" data-name="Group 2141" transform="translate(0 221)">
        <text id="After_clearing_site_data_Refresh_the_page_by_clicking_the_Reload_button._This_loads_up_a_new_instance_of_the_MSDAT_Dashboard." data-name="After clearing site data, Refresh the page by clicking the Reload button. This loads up a new instance of the MSDAT Dashboard." transform="translate(536 350)" fill="#232323" font-size="20" font-family="WorkSans-Regular, Work Sans"><tspan x="0" y="19">After clearing site data, </tspan><tspan y="19" font-family="WorkSans-Bold, Work Sans" font-weight="700">Refresh the page</tspan><tspan y="19" xml:space="preserve"> by clicking the </tspan><tspan y="19" font-family="WorkSans-Bold, Work Sans" font-weight="700">Reload </tspan><tspan y="19">button. This loads up a </tspan><tspan x="0" y="43">new instance of the MSDAT Dashboard.</tspan></text>
