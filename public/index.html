<!DOCTYPE html>

    <meta charset="utf-8" />

    <meta http-equiv="X-Frame-Options" content="allow" />

      rel="icon"

      sizes="16x16"

      content="<%= BASE_URL %>img/icons/msapplication-icon-144x144.png"
    />
