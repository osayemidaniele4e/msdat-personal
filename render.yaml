services:
  - type: web
    name: msdat
    runtime: node
    buildCommand: npm install --include=dev && NODE_OPTIONS=--openssl-legacy-provider npm run build
    startCommand: NODE_ENV=production node server/index.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: CORS_ORIGIN
        sync: false  # Set this to your Render URL after first deploy, e.g. https://msdat.onrender.com

      # VUE_APP_* vars must be set at build time — add them in Render dashboard
      - key: VUE_APP_API_BASE_URL
        sync: false
      - key: VUE_APP_API_BASE_URL1
        sync: false
      - key: VUE_APP_API_TOKEN
        sync: false
      - key: VUE_APP_API_LOGIN_URL
        sync: false
      - key: VUE_APP_API_GPT_URL
        sync: false
      - key: VUE_APP_FRONTEND_KEY_ID
        sync: false
      - key: VUE_APP_FRONTEND_AUTH
        sync: false
      - key: VUE_APP_GOOGLE_CLIENT_ID
        sync: false
      - key: VUE_APP_INDICATOR_SEARCH_USERNAME
        sync: false
      - key: VUE_APP_INDICATOR_SEARCH_PASSWORD
        sync: false
